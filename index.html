<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Device Router</title>
	<style>
		html, body {
			margin: 0;
			width: 100%;
			height: 100%;
			background: #000;
			color: #bbb;
			font-family: "Courier New", monospace;
			display: grid;
			place-items: center;
		}

		body {
			padding: 20px;
			box-sizing: border-box;
		}

		.status {
			text-transform: uppercase;
			letter-spacing: 0.12em;
			font-size: 12px;
			text-align: center;
		}

		.chooser {
			display: none;
			margin-top: 14px;
			gap: 10px;
			flex-wrap: wrap;
			justify-content: center;
		}

		.chooser.visible {
			display: flex;
		}

		.route-btn {
			background: transparent;
			border: 1px solid rgba(255, 255, 255, 0.35);
			color: #e2e2e2;
			padding: 9px 14px;
			font-family: "Courier New", monospace;
			font-size: 11px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			cursor: pointer;
		}

		.route-btn:hover {
			border-color: rgba(255, 255, 255, 0.7);
		}
	</style>
</head>
<body>
	<div class="status" id="status">Routing to the best experience...</div>
	<div class="chooser" id="chooser">
		<button class="route-btn" id="open-gyro" type="button">Open Mobile Gyro</button>
		<button class="route-btn" id="open-keyboard" type="button">Open Desktop Keyboard</button>
	</div>
	<script>
		(function () {
			var statusEl = document.getElementById('status');
			var chooserEl = document.getElementById('chooser');
			var gyroBtn = document.getElementById('open-gyro');
			var keyboardBtn = document.getElementById('open-keyboard');
			var params = new URLSearchParams(window.location.search);
			var forceManual = params.get('manual') === '1';
			var redirected = false;

			function showChooser(message) {
				statusEl.textContent = message;
				chooserEl.classList.add('visible');
			}

			gyroBtn.addEventListener('click', function () {
				window.location.href = 'gyro.html';
			});

			keyboardBtn.addEventListener('click', function () {
				window.location.href = 'keyboard.html';
			});

			if (forceManual) {
				showChooser('Manual test mode enabled. Choose a view.');
				return;
			}

			try {
				var ua = navigator.userAgent || "";
				var hasUA = ua.length > 0;
				var mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
				var touchPoints = navigator.maxTouchPoints || 0;
				var hasScreen = typeof screen !== 'undefined' && typeof screen.width === 'number' && typeof screen.height === 'number';
				var compactTouchDevice = hasScreen && touchPoints > 1 && Math.min(screen.width, screen.height) <= 1024;
				var confidentDetection = hasUA || hasScreen;
				var isMobile = mobileUA || compactTouchDevice;

				if (!confidentDetection) {
					showChooser('Could not detect device. Choose mode manually.');
					return;
				}

				var target = isMobile ? 'gyro.html' : 'keyboard.html';
				redirected = true;
				window.location.replace(target);
			} catch (err) {
				showChooser('Detection failed. Choose mode manually.');
			}

			setTimeout(function () {
				if (!redirected && !document.hidden) {
					showChooser('Routing delayed. Choose mode manually.');
				}
			}, 900);
		})();
	</script>
	<noscript>
		<div class="status">JavaScript required. Open gyro.html or keyboard.html directly.</div>
	</noscript>
</body>
</html>
