<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View-Relative Rotation Cube</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { width: 100vw; height: 100vh; }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            image-rendering: pixelated;
        }
        .sensor-panel {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: min(320px, calc(100vw - 32px));
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 14px;
            background: rgba(10, 10, 10, 0.72);
            backdrop-filter: blur(10px);
            color: #f5f5f5;
            font: 500 14px/1.4 "Segoe UI", sans-serif;
        }
        .sensor-panel button {
            appearance: none;
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f5f5f5;
            color: #111;
            font: inherit;
            cursor: pointer;
        }
        .sensor-panel button.secondary {
            background: rgba(255, 255, 255, 0.12);
            color: #f5f5f5;
        }
        .sensor-panel button:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .sensor-status {
            color: rgba(255, 255, 255, 0.72);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="fullscreen-canvas"></canvas>
    <div class="sensor-panel">
        <button id="sensor-toggle" type="button">Enable motion lock</button>
        <button id="sensor-recenter" class="secondary" type="button" disabled>Recenter lock</button>
        <div id="sensor-status" class="sensor-status">Motion lock is off. Keyboard controls still work.</div>
    </div>
    <script>
        const IDENTITY_MATRIX = [
            1, 0, 0,
            0, 1, 0,
            0, 0, 1
        ];

        // Render matrix for the current frame.
        let matrix = IDENTITY_MATRIX.slice();
        let manualMatrix = IDENTITY_MATRIX.slice();

        let sensorEnabled = false;
        let sensorSource = null;
        let sensorRawDeviceToWorldMatrix = null;
        let sensorReferenceScreenToWorldMatrix = null;
        let pendingSensorCalibration = false;
        let sensorListener = null;

        const sensorToggle = document.getElementById('sensor-toggle');
        const sensorRecenter = document.getElementById('sensor-recenter');
        const sensorStatus = document.getElementById('sensor-status');

        const ROT_STEP = 0.0075;
        const TARGET_FPS = 165;
        const pressed = {};

        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            pressed[key] = true;
            if (key === 'r') {
                manualMatrix = IDENTITY_MATRIX.slice();
                if (sensorEnabled) {
                    calibrateSensorReference();
                }
            }
        });
        window.addEventListener('keyup', e => { pressed[e.key.toLowerCase()] = false; });

        // Matrix multiplication helper: result = A * B
        function multiply(A, B) {
            const C = new Array(9).fill(0);
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    C[i * 3 + j] = A[i * 3 + 0] * B[0 * 3 + j] +
                                   A[i * 3 + 1] * B[1 * 3 + j] +
                                   A[i * 3 + 2] * B[2 * 3 + j];
                }
            }
            return C;
        }

        function transpose3(M) {
            return [
                M[0], M[3], M[6],
                M[1], M[4], M[7],
                M[2], M[5], M[8]
            ];
        }

        function rotationZMatrix(angleRadians) {
            const cos = Math.cos(angleRadians);
            const sin = Math.sin(angleRadians);
            return [
                cos, -sin, 0,
                sin, cos, 0,
                0, 0, 1
            ];
        }

        function getScreenAngleRadians() {
            const angle = window.screen?.orientation?.angle;
            if (typeof angle === 'number') {
                return angle * Math.PI / 180;
            }
            if (typeof window.orientation === 'number') {
                return window.orientation * Math.PI / 180;
            }
            return 0;
        }

        function dot3(a, b) {
            return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }

        function cross3(a, b) {
            return [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ];
        }

        function normalize3(v) {
            const len = Math.hypot(v[0], v[1], v[2]);
            if (len < 1e-8) return null;
            return [v[0] / len, v[1] / len, v[2] / len];
        }

        function orthonormalize(M) {
            // Rows of our matrix represent the rotated basis vectors.
            const r0 = [M[0], M[1], M[2]];
            const r1 = [M[3], M[4], M[5]];

            const x = normalize3(r0);
            if (!x) return [1, 0, 0, 0, 1, 0, 0, 0, 1];

            // Gram-Schmidt: remove r1 component along x, then normalize.
            const proj = dot3(r1, x);
            const yBase = [r1[0] - proj * x[0], r1[1] - proj * x[1], r1[2] - proj * x[2]];
            let y = normalize3(yBase);
            if (!y) {
                // Fallback for near-parallel axes.
                y = Math.abs(x[0]) < 0.9 ? normalize3(cross3([1, 0, 0], x)) : normalize3(cross3([0, 1, 0], x));
            }

            const z = normalize3(cross3(x, y));
            const yFixed = normalize3(cross3(z, x));

            return [
                x[0], x[1], x[2],
                yFixed[0], yFixed[1], yFixed[2],
                z[0], z[1], z[2]
            ];
        }

        function normalizeQuaternion(q) {
            const len = Math.hypot(q[0], q[1], q[2], q[3]);
            if (len < 1e-8) return null;
            return [q[0] / len, q[1] / len, q[2] / len, q[3] / len];
        }

        function multiplyQuaternion(a, b) {
            return [
                a[3] * b[0] + a[0] * b[3] + a[1] * b[2] - a[2] * b[1],
                a[3] * b[1] - a[0] * b[2] + a[1] * b[3] + a[2] * b[0],
                a[3] * b[2] + a[0] * b[1] - a[1] * b[0] + a[2] * b[3],
                a[3] * b[3] - a[0] * b[0] - a[1] * b[1] - a[2] * b[2]
            ];
        }

        function quaternionFromAxisAngle(axis, angleRadians) {
            const halfAngle = angleRadians / 2;
            const sin = Math.sin(halfAngle);
            return [axis[0] * sin, axis[1] * sin, axis[2] * sin, Math.cos(halfAngle)];
        }

        function quaternionFromEulerYXZ(x, y, z) {
            const c1 = Math.cos(x / 2);
            const c2 = Math.cos(y / 2);
            const c3 = Math.cos(z / 2);
            const s1 = Math.sin(x / 2);
            const s2 = Math.sin(y / 2);
            const s3 = Math.sin(z / 2);

            return [
                s1 * c2 * c3 + c1 * s2 * s3,
                c1 * s2 * c3 - s1 * c2 * s3,
                c1 * c2 * s3 - s1 * s2 * c3,
                c1 * c2 * c3 + s1 * s2 * s3
            ];
        }

        function matrixFromQuaternion(q) {
            const normalized = normalizeQuaternion(q);
            if (!normalized) return IDENTITY_MATRIX.slice();

            const [x, y, z, w] = normalized;
            const xx = x * x;
            const yy = y * y;
            const zz = z * z;
            const xy = x * y;
            const xz = x * z;
            const yz = y * z;
            const wx = w * x;
            const wy = w * y;
            const wz = w * z;

            return orthonormalize([
                1 - 2 * (yy + zz), 2 * (xy - wz), 2 * (xz + wy),
                2 * (xy + wz), 1 - 2 * (xx + zz), 2 * (yz - wx),
                2 * (xz - wy), 2 * (yz + wx), 1 - 2 * (xx + yy)
            ]);
        }

        function setSensorStatus(message) {
            sensorStatus.textContent = message;
        }

        function refreshSensorButtons() {
            sensorToggle.textContent = sensorEnabled ? 'Disable motion lock' : 'Enable motion lock';
            sensorRecenter.disabled = !sensorEnabled || !sensorRawDeviceToWorldMatrix;
        }

        function getCurrentSensorScreenToWorldMatrix() {
            if (!sensorRawDeviceToWorldMatrix) return null;
            return orthonormalize(multiply(sensorRawDeviceToWorldMatrix, rotationZMatrix(getScreenAngleRadians())));
        }

        function calibrateSensorReference() {
            const current = getCurrentSensorScreenToWorldMatrix();
            if (!current) {
                pendingSensorCalibration = true;
                setSensorStatus('Waiting for the first sensor sample...');
                refreshSensorButtons();
                return;
            }

            sensorReferenceScreenToWorldMatrix = current.slice();
            pendingSensorCalibration = false;
            setSensorStatus('Motion lock is active. The cube stays world-locked while you move the phone.');
            refreshSensorButtons();
        }

        function pushSensorMatrix(rawDeviceToWorldMatrix) {
            sensorRawDeviceToWorldMatrix = orthonormalize(transpose3(rawDeviceToWorldMatrix));
            if (pendingSensorCalibration || !sensorReferenceScreenToWorldMatrix) {
                calibrateSensorReference();
            }
            refreshSensorButtons();
        }

        function stopSensorSource() {
            if (sensorSource && typeof sensorSource.stop === 'function') {
                sensorSource.stop();
            }
            if (sensorListener) {
                window.removeEventListener('deviceorientation', sensorListener, true);
                sensorListener = null;
            }
            sensorSource = null;
        }

        function stopSensorLock() {
            sensorEnabled = false;
            stopSensorSource();
            sensorRawDeviceToWorldMatrix = null;
            sensorReferenceScreenToWorldMatrix = null;
            pendingSensorCalibration = false;
            setSensorStatus('Motion lock is off. Keyboard controls still work.');
            refreshSensorButtons();
        }

        function handleGenericOrientationReading(sensor, label) {
            const quaternion = sensor.quaternion;
            if (!quaternion) return;
            pushSensorMatrix(matrixFromQuaternion(quaternion));
            if (sensorEnabled) {
                setSensorStatus('Motion lock is active via ' + label + '.');
            }
        }

        function startAbsoluteOrientationSensor() {
            if (!('AbsoluteOrientationSensor' in window)) return false;

            const sensor = new AbsoluteOrientationSensor({ frequency: 60, referenceFrame: 'device' });
            sensor.addEventListener('reading', () => handleGenericOrientationReading(sensor, 'gyroscope + accelerometer + magnetometer'));
            sensor.addEventListener('error', event => {
                setSensorStatus('Absolute orientation sensor failed: ' + event.error.name + '. Falling back if possible.');
            });
            sensor.start();
            sensorSource = sensor;
            return true;
        }

        function startRelativeOrientationSensor() {
            if (!('RelativeOrientationSensor' in window)) return false;

            const sensor = new RelativeOrientationSensor({ frequency: 60, referenceFrame: 'device' });
            sensor.addEventListener('reading', () => handleGenericOrientationReading(sensor, 'gyroscope + accelerometer'));
            sensor.addEventListener('error', event => {
                setSensorStatus('Relative orientation sensor failed: ' + event.error.name + '. Falling back if possible.');
            });
            sensor.start();
            sensorSource = sensor;
            return true;
        }

        function startDeviceOrientationFallback() {
            if (!('DeviceOrientationEvent' in window)) return false;

            sensorListener = event => {
                const alpha = (event.alpha || 0) * Math.PI / 180;
                const beta = (event.beta || 0) * Math.PI / 180;
                const gamma = (event.gamma || 0) * Math.PI / 180;

                const deviceQuaternion = quaternionFromEulerYXZ(beta, alpha, -gamma);
                const cameraAlignment = [-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)];
                const alignedQuaternion = multiplyQuaternion(deviceQuaternion, cameraAlignment);
                pushSensorMatrix(matrixFromQuaternion(alignedQuaternion));

                if (sensorEnabled) {
                    const label = event.absolute ? 'device orientation (absolute heading)' : 'device orientation';
                    setSensorStatus('Motion lock is active via ' + label + '.');
                }
            };

            window.addEventListener('deviceorientation', sensorListener, true);
            sensorSource = { stop() {} };
            return true;
        }

        async function requestMotionPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const orientationPermission = await DeviceOrientationEvent.requestPermission();
                if (orientationPermission !== 'granted') {
                    throw new Error('Device orientation permission was denied.');
                }
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const motionPermission = await DeviceMotionEvent.requestPermission();
                if (motionPermission !== 'granted') {
                    throw new Error('Device motion permission was denied.');
                }
            }
        }

        async function startSensorLock() {
            stopSensorSource();
            sensorEnabled = true;
            sensorRawDeviceToWorldMatrix = null;
            sensorReferenceScreenToWorldMatrix = null;
            pendingSensorCalibration = true;
            refreshSensorButtons();
            setSensorStatus('Requesting motion sensor access...');

            try {
                await requestMotionPermissions();

                const started = startAbsoluteOrientationSensor() || startRelativeOrientationSensor() || startDeviceOrientationFallback();
                if (!started) {
                    throw new Error('No supported orientation sensor API is available in this browser.');
                }

                setSensorStatus('Move the phone slightly to calibrate the motion lock.');
            } catch (error) {
                stopSensorLock();
                setSensorStatus(error.message);
            }
        }

        async function toggleSensorLock() {
            if (sensorEnabled) {
                stopSensorLock();
                return;
            }

            await startSensorLock();
        }

        function updateRotation(dtSeconds) {
            let delta = [1, 0, 0, 0, 1, 0, 0, 0, 1]; // Identity
            const step = ROT_STEP * TARGET_FPS * dtSeconds;

            // Create incremental rotation based on view axis
            if (pressed['w'] || pressed['s']) {
                const a = pressed['w'] ? -step : step;
                const cos = Math.cos(a), sin = Math.sin(a);
                // Rotate around Screen X-axis
                delta = multiply([1, 0, 0, 0, cos, -sin, 0, sin, cos], delta);
            }
            if (pressed['a'] || pressed['d']) {
                const a = pressed['a'] ? step : -step;
                const cos = Math.cos(a), sin = Math.sin(a);
                // Rotate around Screen Y-axis
                delta = multiply([cos, 0, sin, 0, 1, 0, -sin, 0, cos], delta);
            }
            if (pressed['q'] || pressed['e']) {
                const a = pressed['q'] ? -step : step;
                const cos = Math.cos(a), sin = Math.sin(a);
                // Rotate around Screen Z-axis
                delta = multiply([cos, -sin, 0, sin, cos, 0, 0, 0, 1], delta);
            }

            // Apply the delta rotation TO the current matrix
            // This order (delta * matrix) makes rotation relative to the SCREEN
            manualMatrix = multiply(delta, manualMatrix);
            manualMatrix = orthonormalize(manualMatrix);
        }

        function updateRenderMatrix() {
            const currentSensorScreenToWorldMatrix = sensorEnabled ? getCurrentSensorScreenToWorldMatrix() : null;

            if (sensorEnabled && currentSensorScreenToWorldMatrix && sensorReferenceScreenToWorldMatrix) {
                matrix = multiply(
                    multiply(transpose3(currentSensorScreenToWorldMatrix), sensorReferenceScreenToWorldMatrix),
                    manualMatrix
                );
                matrix = orthonormalize(matrix);
                return;
            }

            matrix = manualMatrix.slice();
        }

        function rotateVertex([x, y, z]) {
            // Simply multiply vector by our orientation matrix
            return [
                x * matrix[0] + y * matrix[1] + z * matrix[2],
                x * matrix[3] + y * matrix[4] + z * matrix[5],
                x * matrix[6] + y * matrix[7] + z * matrix[8]
            ];
        }

        function draw(ctx, width, height) {
            const cubeSize = 100;
            const vertices = [
                [-cubeSize, -cubeSize, -cubeSize], [cubeSize, -cubeSize, -cubeSize],
                [cubeSize, cubeSize, -cubeSize], [-cubeSize, cubeSize, -cubeSize],
                [-cubeSize, -cubeSize, cubeSize], [cubeSize, -cubeSize, cubeSize],
                [cubeSize, cubeSize, cubeSize], [-cubeSize, cubeSize, cubeSize]
            ];
            const edges = [
                [0, 1], [1, 2], [2, 3], [3, 0], [4, 5], [5, 6],
                [6, 7], [7, 4], [0, 4], [1, 5], [2, 6], [3, 7]
            ];

            const perspective = (x, y, z) => {
                const fov = 500;
                const scale = fov / (fov + z);
                return [x * scale + width / 2, y * scale + height / 2];
            };

            const dpr = window.devicePixelRatio || 1;
            const pixelWidth = Math.floor(width * dpr);
            const pixelHeight = Math.floor(height * dpr);
            let imageData = ctx.createImageData(pixelWidth, pixelHeight);
            let data = imageData.data;

            function clamp01(v) {
                return Math.max(0, Math.min(1, v));
            }

            function linearToSrgb(v) {
                if (v <= 0.0031308) return 12.92 * v;
                return 1.055 * Math.pow(v, 1 / 2.4) - 0.055;
            }

            function oklchToRgba8(l, c, hDeg, alpha = 1) {
                const hRad = hDeg * Math.PI / 180;
                const a = c * Math.cos(hRad);
                const b = c * Math.sin(hRad);

                const l_ = l + 0.3963377774 * a + 0.2158037573 * b;
                const m_ = l - 0.1055613458 * a - 0.0638541728 * b;
                const s_ = l - 0.0894841775 * a - 1.2914855480 * b;

                const l3 = l_ * l_ * l_;
                const m3 = m_ * m_ * m_;
                const s3 = s_ * s_ * s_;

                const rLin = 4.0767416621 * l3 - 3.3077115913 * m3 + 0.2309699292 * s3;
                const gLin = -1.2684380046 * l3 + 2.6097574011 * m3 - 0.3413193965 * s3;
                const bLin = -0.0041960863 * l3 - 0.7034186147 * m3 + 1.7076147010 * s3;

                const r = Math.round(clamp01(linearToSrgb(rLin)) * 255);
                const g = Math.round(clamp01(linearToSrgb(gLin)) * 255);
                const b8 = Math.round(clamp01(linearToSrgb(bLin)) * 255);
                const a8 = Math.round(clamp01(alpha) * 255);

                return [r, g, b8, a8];
            }

            function setPixel(x, y, l, c, h, a = 1) {
                if (x < 0 || y < 0 || x >= pixelWidth || y >= pixelHeight) return;
                let idx = 4 * (Math.floor(x) + Math.floor(y) * pixelWidth);
                const [r8, g8, b8, a8] = oklchToRgba8(l, c, h, a);
                data[idx] = r8;
                data[idx + 1] = g8;
                data[idx + 2] = b8;
                data[idx + 3] = a8;
            }

            function drawLine(x0, y0, x1, y1) {
                x0 = Math.round(x0); y0 = Math.round(y0);
                x1 = Math.round(x1); y1 = Math.round(y1);
                let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
                let dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
                let err = dx + dy, e2;
                while (true) {
                    setPixel(x0, y0, 0.8608, 0.3412, 142.4953, 1);
                    if (x0 === x1 && y0 === y1) break;
                    e2 = 2 * err;
                    if (e2 >= dy) { err += dy; x0 += sx; }
                    if (e2 <= dx) { err += dx; y0 += sy; }
                }
            }

            edges.forEach(([start, end]) => {
                const [x1, y1, z1] = rotateVertex(vertices[start]);
                const [x2, y2, z2] = rotateVertex(vertices[end]);
                const [px1, py1] = perspective(x1, y1, z1);
                const [px2, py2] = perspective(x2, y2, z2);
                drawLine(px1 * dpr, py1 * dpr, px2 * dpr, py2 * dpr);
            });

            ctx.clearRect(0, 0, width, height);
            ctx.putImageData(imageData, 0, 0);
        }

        let lastTimestamp = 0;

        function animate(timestamp) {
            const dtSeconds = lastTimestamp === 0
                ? 1 / TARGET_FPS
                : Math.min((timestamp - lastTimestamp) / 1000, 0.1);
            lastTimestamp = timestamp;

            updateRotation(dtSeconds);
            updateRenderMatrix();
            const canvas = document.getElementById('fullscreen-canvas');
            const ctx = canvas.getContext('2d');
            draw(ctx, canvas.clientWidth, canvas.clientHeight);
            requestAnimationFrame(animate);
        }

        function resizeCanvas() {
            const canvas = document.getElementById('fullscreen-canvas');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', updateRenderMatrix);
        sensorToggle.addEventListener('click', () => {
            toggleSensorLock();
        });
        sensorRecenter.addEventListener('click', () => {
            calibrateSensorReference();
        });
        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvas();
            animate();
            refreshSensorButtons();
        });
    </script>
</body>
</html>
